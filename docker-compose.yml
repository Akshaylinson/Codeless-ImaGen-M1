services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codelessai-smart-image-editor
    ports:
      - "${PORT}:${PORT}"
    environment:
      APP_ENV: ${APP_ENV}
      HOST: ${HOST}
      PORT: ${PORT}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      API_PREFIX: ${API_PREFIX}
      FRONTEND_URL: ${FRONTEND_URL}
      STATIC_URL: ${STATIC_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENABLE_HTTPS: ${ENABLE_HTTPS}
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB}
      MAX_IMAGE_DIMENSION: ${MAX_IMAGE_DIMENSION}
      MAX_CONCURRENT_JOBS: ${MAX_CONCURRENT_JOBS}
      MODELS_DIR: ${MODELS_DIR}
      INTENT_MODEL_PATH: ${INTENT_MODEL_PATH}
      INTENT_MODEL_N_CTX: ${INTENT_MODEL_N_CTX}
      INTENT_MODEL_N_THREADS: ${INTENT_MODEL_N_THREADS}
      INTENT_MODEL_N_GPU_LAYERS: ${INTENT_MODEL_N_GPU_LAYERS}
      INTENT_MODEL_MAX_TOKENS: ${INTENT_MODEL_MAX_TOKENS}
      INTENT_MODEL_TEMPERATURE: ${INTENT_MODEL_TEMPERATURE}
      INTENT_MODEL_TOP_P: ${INTENT_MODEL_TOP_P}
    volumes:
      - codelessai_storage:/app/storage
      - codelessai_logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped

volumes:
  codelessai_storage:
  codelessai_logs:
