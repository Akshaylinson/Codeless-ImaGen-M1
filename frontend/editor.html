<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - CodelessAI Smart Image Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/config.js"></script>
  <script type="module" src="/static/js/pages/editor.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/"><span class="brand-mark"></span><span>CodelessAI Smart Image Editor</span></a>
      <nav class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/admin.html">Admin</a>
      </nav>
    </header>
    <section class="grid-2">
      <div class="panel section">
        <h2>Upload and instruct</h2>
        <div id="uploadZone"></div>
        <div class="field" style="margin-top:16px;">
          <label for="instruction">Instruction</label>
          <textarea id="instruction" placeholder="Remove the sunglasses.">Remove the sunglasses.</textarea>
        </div>
        <button id="generateBtn" class="button">Generate edit</button>
        <div style="margin-top:18px;" class="progress"><span id="progressBar"></span></div>
        <p id="jobStatus" class="muted" style="margin-top:10px;">Waiting for input.</p>
      </div>
      <div class="panel section">
        <h2>Preview</h2>
        <div id="preview" class="preview">No image selected</div>
      </div>
    </section>
    <section class="panel section">
      <h2>Before / After</h2>
      <div id="comparison"></div>
      <div class="nav" style="margin-top:14px;">
        <a id="downloadLink" class="button" href="#" download>Download result</a>
      </div>
    </section>
  </div>
</body>
</html>
