<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - CodelessAI Smart Image Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/css/styles.css">
  <script src="/config.js"></script>
  <script type="module" src="/static/js/pages/dashboard.js"></script>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <a class="brand" href="/"><span class="brand-mark"></span><span>CodelessAI Smart Image Editor</span></a>
      <nav class="nav">
        <a href="/editor.html">Editor</a>
        <a href="/gallery.html">Gallery</a>
        <a href="/admin.html">Admin</a>
      </nav>
    </header>
    <section class="grid-2">
      <div class="panel section">
        <h2>Login</h2>
        <div class="stack">
          <div class="field"><label>Username</label><input id="username" value="admin"></div>
          <div class="field"><label>Password</label><input id="password" type="password" value="admin"></div>
          <button id="loginBtn" class="button">Login</button>
          <div id="authStatus" class="muted"></div>
        </div>
      </div>
      <div class="panel section">
        <h2>System Metrics</h2>
        <div id="metrics" class="stack"></div>
      </div>
    </section>
    <section class="panel section">
      <h2>Recent Jobs</h2>
      <table class="table">
        <thead>
          <tr><th>ID</th><th>Status</th><th>Instruction</th><th>Progress</th></tr>
        </thead>
        <tbody id="recentJobs"></tbody>
      </table>
    </section>
  </div>
</body>
</html>
